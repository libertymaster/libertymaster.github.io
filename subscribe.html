<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="Subscribe to The Liberty Articulator for updates, articles, and historical commentary."
  >

  <title>Subscribe | The Liberty Articulator</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="styles.css">
</head>

<body id="top">
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main id="main-content" class="container site-container subscribe-page">
    <section class="subscribe-card" aria-labelledby="subscribe-title">
      <h1 id="subscribe-title">Subscribe to</h1> 
      <h1 id="subscribe-title">The Liberty Articulator</h1>

      <p>
        Get new content and updates delivered to your inbox.
      </p>

      <form action="/action_page.php" method="post">
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input
            id="email"
            class="form-control"
            type="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="mb-3">
          <label for="name" class="form-label">Name <span class="form-note">(optional)</span></label>
          <input
            id="name"
            class="form-control"
            type="text"
            name="name"
            placeholder="Your name"
            autocomplete="name"
          >
        </div>

        <div class="form-check mb-4">
          <input
            id="terms"
            class="form-check-input"
            type="checkbox"
            name="terms"
            required
          >
          <label class="form-check-label" for="terms">
            I agree to the <a href="terms.html">Terms &amp; Privacy Policy</a>.
          </label>
        </div>

        <button type="submit" class="btn btn-accent w-100">
          Subscribe
        </button>

        <p class="form-note mt-3 mb-0">
          Thank you for subscribing!
        </p>
      </form>
    </section>
  </main>

  <footer class="site-footer">

      <p>
        &copy; 2022 - <span id="year"></span> The Liberty Articulator - All Rights Reserved.
      </p>

      <div class="footer-links">
        <a href="#top">Back to top</a>
        <a href="index.html">Back to Home page</a>
      </div>
      
  </footer>

  <script>
    const yearElement = document.getElementById("year");

    if (yearElement) {
      yearElement.textContent = new Date().getFullYear();
    }
  </script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
</body>
</html>
